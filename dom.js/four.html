<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: white;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanguage (languageName) {
        const li = document.createElement('li');
        li.innerHTML= `${languageName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("TypeScript")

    function addOptiLanguage (langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("golang")

    // Edit
   const secondLang = document.querySelector('li:nth-child(2)')
//    secondLang.innerHTML = "Mojo"
   const newli = document.createElement('li');
   newli.textContent= "Mojo"
   secondLang.replaceWith(newli)

   const thirdLang = document.querySelector('li:nth-child(3)')
   const thirdli = document.createElement('li');
   thirdli.textContent = "Java"
   thirdLang.replaceWith(thirdli)

// edit
const firstLang = document.querySelector('li:first-child')
const ouertHTML1 = firstLang.outerHTML = '<li>C++</li>'
console.log(ouertHTML1);


// remove 

const lastlang = document.querySelector('li:last-child')
lastlang.remove()
   

</script>
</html>
